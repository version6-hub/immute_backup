name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # Regenerates lockfile in CI; trade reproducibility for a smaller repo.
      - run: npm install --no-audit --no-fund
      - name: Build static bundle
        env:
          # Match these to the repo's actual GitHub Pages URL.
          # If publishing under a custom domain (CNAME) set BASE_PATH=/ here.
          BASE_PATH: /immute_backup/
          VITE_WALLETCONNECT_PROJECT_ID: ${{ secrets.VITE_WALLETCONNECT_PROJECT_ID }}
          VITE_MAINNET_RPC_URL: ${{ secrets.VITE_MAINNET_RPC_URL }}
          VITE_SEPOLIA_RPC_URL: ${{ secrets.VITE_SEPOLIA_RPC_URL }}
        run: npm run build
      - name: Add SPA fallback
        # GH Pages serves 404.html on unknown routes. Mirror index.html so
        # any non-root URL still loads the app instead of a 404.
        run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
